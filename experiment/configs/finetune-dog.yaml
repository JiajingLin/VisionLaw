overwrite: true

llm:
  elasticity:
    num_exploit: 2
    num_explore: 4
    temperature_exploit: 0.5
    temperature_explore: 1.0
    batch_size: 3  
  plasticity:
    num_exploit: 2
    num_explore: 4
    temperature_exploit: 0.5
    temperature_explore: 1.0
    batch_size: 3  
  elastoplasticity:
    num_exploit: 6
    num_explore: 12
    temperature_exploit: 0.5
    temperature_explore: 1.0
    batch_size: 5  


gaussians:
  sh_degree: 0
  opacity_thres: 0.02
  scaling_modifier: 1.2   
  kernels_path: path/to/assets/real-dog/kernels.ply    # Replace this with the path to the reconstructed Gaussian kernels

physics:
  sim:
    substeps: 20  
    nframes: 18  
    skip_frames: 1

    gravity:
      - 0.0
      - 0.0
      - 9.8
    bc: noslip
    num_grids: 70
    dt: 0.0005
    bound: 1
    eps: 6e-7


particles:
  shape:
    pcd_name: real-dog/particles
    asset_root: path/to/assets
    sort: null
    ori_bounds:
    - [0.0, 0.0, -1.01]
    - [1.0, 1.0, -0.01]
    sim_bounds:
    - [0.0, 0.0, 0.0]
    - [1.0, 1.0, 1.0]
  rho: 1000.0                     
  clip_bound: 0.1                 

dataset:
  eval: false
  camera_type: RealCapture
  device: cuda:0
  data:
    path: path/to/data/dog               # Replace this with the path to the dataset folder
    transformsfile: data_dynamic.json
    white_background: false
    exclude_steps:
    - -1
    - 19
    used_views: 
    - r_0
    init_path: experiment/ckpt/dog/init.pt
    nframes: 18    
    skip_frames: 1  
    read_mask_only: false
  camera:
    resolution: 1
    data_device: cuda:0

loss:
  pixel_loss: l2
  decay_init: 0.5
  decay_final: 1.0
  lambda_max_decay: 0.33
  decay_steps: 25

  use_ssim: true
  use_flow: false

optim:
  upper:
    alternate_epochs: 2   # 2 * 2
    joint_epochs: 3
  lower: 
    num_epochs: 10
    lr: 0.03
    frames_per_stage: 3
    steps_per_frame: 20  